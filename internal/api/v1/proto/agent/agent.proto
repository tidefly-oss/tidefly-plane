syntax = "proto3";

package agent.v1;

option go_package = "github.com/tidefly-oss/tidefly-plane/internal/api/v1/proto/agent;agentpb";

service AgentService {
  rpc Connect(stream AgentMessage) returns (stream PlaneMessage);
  rpc Ping(PingRequest) returns (PingResponse);
}

// ── Ping ──────────────────────────────────────────────────────────────────────

message PingRequest {
  string worker_id = 1;
}

message PingResponse {
  string plane_version = 1;
  int64 timestamp = 2;
}

// ── Messages: Worker → Plane ──────────────────────────────────────────────────

message AgentMessage {
  string message_id = 1;
  string worker_id = 2;

  oneof payload {
    AgentHello hello = 10;
    AgentHeartbeat heartbeat = 11;
    CommandAck command_ack = 12;
    ContainerListResult container_list = 13;
    ContainerLogsResult container_logs = 14;
    MetricsResult metrics = 15;
    DeployResult deploy_result = 16;
    HealResult heal_result = 17;
    ScaleResult scale_result = 18;
    ErrorEvent error = 99;
  }
}

message AgentHello {
  string agent_version = 1;
  string os = 2;
  string arch = 3;
  string runtime_type = 4;
  string hostname = 5;
}

message AgentHeartbeat {
  int64 timestamp = 1;
  int32 container_count = 2;
  double cpu_percent = 3;
  double mem_percent = 4;
}

message CommandAck {
  string command_id = 1;
  bool accepted = 2;
  string reason = 3;
}

message ContainerListResult {
  string command_id = 1;
  repeated Container containers = 2;
}

message Container {
  string id = 1;
  string name = 2;
  string image = 3;
  string status = 4;
  string state = 5;
  int64 created = 6;
  map<string, string> labels = 7;
  repeated PortBinding ports = 8;
}

message PortBinding {
  string host_ip = 1;
  int32 host_port = 2;
  int32 container_port = 3;
  string protocol = 4;
}

message ContainerLogsResult {
  string command_id = 1;
  string container_id = 2;
  string line = 3;
  bool is_stderr = 4;
  int64 timestamp = 5;
}

message MetricsResult {
  string command_id = 1;
  double cpu_percent = 2;
  double mem_used_mb = 3;
  double mem_total_mb = 4;
  double disk_used_gb = 5;
  double disk_total_gb = 6;
  double net_rx_mb = 7;
  double net_tx_mb = 8;
}

message DeployResult {
  string command_id = 1;
  bool success = 2;
  string container_id = 3;
  string error = 4;
}

message HealResult {
  string command_id = 1;
  bool success = 2;
  string container_id = 3;
  string error = 4;
}

message ScaleResult {
  string command_id = 1;
  bool success = 2;
  int32 replicas = 3; // actual replica count after scale
  string error = 4;
}

message ErrorEvent {
  string command_id = 1;
  string code = 2;
  string message = 3;
}

// ── Messages: Plane → Worker ──────────────────────────────────────────────────

message PlaneMessage {
  string command_id = 1;
  string worker_id = 2;

  oneof payload {
    CmdListContainers list_containers = 10;
    CmdStartContainer start_container = 11;
    CmdStopContainer stop_container = 12;
    CmdRestartContainer restart_container = 13;
    CmdRemoveContainer remove_container = 14;
    CmdStreamLogs stream_logs = 15;
    CmdDeploy deploy = 16;
    CmdCollectMetrics collect_metrics = 17;
    CmdRegisterRoute register_route = 18;
    CmdRemoveRoute remove_route = 19;
    CmdHeal heal = 20;
    CmdBlueGreen blue_green = 21;
    CmdRollingUpdate rolling_update = 22;
    CmdAutoscale autoscale = 23;
    PlaneAck ack = 99;
  }
}

message CmdListContainers {}

message CmdStartContainer {
  string container_id = 1;
}

message CmdStopContainer {
  string container_id = 1;
  int32 timeout_sec = 2;
}

message CmdRestartContainer {
  string container_id = 1;
}

message CmdRemoveContainer {
  string container_id = 1;
  bool force = 2;
}

message CmdStreamLogs {
  string container_id = 1;
  bool follow = 2;
  int32 tail_lines = 3;
}

message CmdDeploy {
  string project_id = 1;
  string service_name = 2;
  string image = 3;
  repeated string env = 4;
  repeated PortSpec ports = 5;
  map<string, string> labels = 6;
  ResourceLimits limits = 7;
  repeated VolumeMount volumes = 8;
  string network = 9;
}

// CmdHeal restarts a service from scratch using the stored manifest.
// The agent removes all containers matching the service label and redeploys.
message CmdHeal {
  string service_name = 1;
  string reason = 2;        // "die" | "oom" | "kill" | "healthcheck"
  CmdDeploy deploy = 3;     // full deploy spec to recreate the container
}

// CmdBlueGreen performs a zero-downtime deploy on the worker.
// 1. Deploy new container in inactive slot
// 2. Wait for healthy
// 3. Switch Caddy route
// 4. Remove old container
message CmdBlueGreen {
  string service_name = 1;
  string current_slot = 2;  // "blue" | "green" | "" (first deploy)
  CmdDeploy deploy = 3;     // deploy spec for the new slot
  string domain = 4;        // domain to switch route on
  int32 port = 5;           // container port for new upstream
  bool tls = 6;
}

// CmdRollingUpdate replaces containers one by one.
message CmdRollingUpdate {
  string service_name = 1;
  CmdDeploy deploy = 2;     // new deploy spec
  int32 replicas = 3;       // total desired replicas
}

// CmdAutoscale adjusts the replica count on the worker.
message CmdAutoscale {
  string service_name = 1;
  CmdDeploy deploy = 2;     // deploy spec (for scale-up new containers)
  int32 current_replicas = 3;
  int32 target_replicas = 4; // positive = scale up, lower = scale down
}

message CmdCollectMetrics {}

message CmdRegisterRoute {
  string upstream = 1;
  string domain = 2;
  bool tls = 3;
}

message CmdRemoveRoute {
  string domain = 1;
}

message PortSpec {
  int32 container_port = 1;
  int32 host_port = 2;
  string protocol = 3;
}

message ResourceLimits {
  int64 memory_bytes = 1;
  double cpu_shares = 2;
}

message VolumeMount {
  string source = 1;
  string target = 2;
  bool read_only = 3;
}

message PlaneAck {
  bool accepted = 1;
  string reason = 2;
}
