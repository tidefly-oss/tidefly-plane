name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Lint
        run: golangci-lint run --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: tidefly-plane
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: tidefly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Wire
        run: go install github.com/google/wire/cmd/wire@latest
      - name: Generate Wire bindings
        run: wire ./internal/bootstrap/
      - name: Test
        env:
          DATABASE_URL: postgres://tidefly-plane:testpassword@localhost:5432/tidefly_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
          APP_SECRET_KEY: test-secret-key-for-ci-only-32chars
        run: go test ./... -race -coverprofile=coverage.txt -covermode=atomic
      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          flags: backend
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Wire
        run: go install github.com/google/wire/cmd/wire@latest
      - name: Generate Wire bindings
        run: wire ./internal/bootstrap/
      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags "-s -w" -o /dev/null ./cmd/tidefly-plane
