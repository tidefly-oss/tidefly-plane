name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Check tag format
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-alpha(\.[0-9]+)?|-beta(\.[0-9]+)?|-rc\.[0-9]+)?$'; then
            echo "Invalid tag format: $TAG"
            echo "Expected: v0.0.1, v1.2.3-alpha, v1.2.3-alpha.1, v1.2.3-beta, v1.2.3-rc.1"
            exit 1
          fi
          echo "Valid tag: $TAG"

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: validate-tag
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install Wire
        run: go install github.com/google/wire/cmd/wire@latest

      - name: Generate Wire bindings
        run: wire ./internal/bootstrap/

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w \
              -X github.com/tidefly-oss/tidefly-plane/internal/version.Version=${{ github.ref_name }} \
              -X github.com/tidefly-oss/tidefly-plane/internal/version.Commit=${{ github.sha }} \
              -X github.com/tidefly-oss/tidefly-plane/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o dist/tidefly-plane-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/tidefly-plane

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tidefly-plane-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/tidefly-plane-*

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: tidefly/tidefly-plane
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true
          pattern: tidefly-plane-*

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_CLEAN="${VERSION#v}"
          NOTES=$(awk "/^## \[${VERSION_CLEAN}\]/{found=1; next} found && /^## \[/{exit} found{print}" changelog.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [changelog.md](changelog.md) for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Write release notes
        run: |
          cat > release_notes.md << 'EOF'
          ## What's Changed

          ${{ steps.changelog.outputs.notes }}

          ## Docker

          ```bash
          docker pull tidefly/tidefly-plane:${{ github.ref_name }}
          ```

          ## Platforms

          `linux/amd64` · `linux/arm64`

          ## Checksums

          See `checksums.txt` in the release assets.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Tidefly Plane ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/*
          draft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: false
