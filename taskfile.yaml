version: "3"

tasks:
  default:
    desc: Show all available tasks
    silent: true
    cmds:
      - task --list

  # ── Code Generation ───────────────────────────────────────────────────────

  wire:
    desc: Regenerate Wire DI bindings (internal/platform/bootstrap/wire_gen.go)
    cmds:
      - which wire || go install github.com/google/wire/cmd/wire@latest
      - wire ./internal/platform/bootstrap/
      - echo 'wire_gen.go updated'

  # ── Development ───────────────────────────────────────────────────────────

  dev:
    desc: Start backend with Air hot reload (runs wire first)
    cmds:
      - which wire || go install github.com/google/wire/cmd/wire@latest
      - wire ./internal/platform/bootstrap/
      - air
    dotenv:
      - "{{.HOME}}/.local/share/tidefly-plane/.env.dev"

  # ── Quality ───────────────────────────────────────────────────────────────

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:cover:
    desc: Run tests with coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy
      - echo 'go.mod cleaned up'

  # ── Build ─────────────────────────────────────────────────────────────────

  build:
    desc: Build production binary (runs wire first)
    cmds:
      - which wire || go install github.com/google/wire/cmd/wire@latest
      - wire ./internal/platform/bootstrap/
      - go build
        -trimpath
        -ldflags="-s -w -X github.com/tidefly-oss/tidefly-plane/internal/platform/version.Version={{.VERSION}}"
        -o dist/tidefly-plane
        ./cmd/tidefly-plane
      - echo 'Binary at dist/tidefly-plane'
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"

  build:docker:
    desc: Build Docker image
    cmds:
      - which wire || go install github.com/google/wire/cmd/wire@latest
      - wire ./internal/platform/bootstrap/
      - docker buildx build
        --platform linux/amd64,linux/arm64
        --build-arg VERSION={{.VERSION}}
        --build-arg COMMIT={{.COMMIT}}
        --build-arg BUILD_DATE={{.BUILD_DATE}}
        -t tidefly/tidefly-plane:{{.VERSION}}
        .
      - echo 'Image built tidefly/tidefly-plane:{{.VERSION}}'
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
      COMMIT:
        sh: git rev-parse --short HEAD
      BUILD_DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ