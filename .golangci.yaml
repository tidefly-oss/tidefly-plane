version: "2"

linters:
  enable:
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - noctx
    - staticcheck
    - unused
    - whitespace

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
  gocyclo:
    min-complexity: 20
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - goconst
    - path: "cmd/.*\\.go"
      linters:
        - govet
    - linters:
        - errcheck
      text: "Error return value of `fmt.Fprintf` is not checked"
    - linters:
        - errcheck
      text: "Error return value of `huma.WriteErr` is not checked"
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  modules-download-mode: readonly