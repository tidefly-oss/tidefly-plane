version: "2"

linters:
  default: none
  enable:
    - unused
    - misspell
    - noctx
    - staticcheck

  settings:
    misspell:
      locale: US
      extra-words:
        - typo: "interaktive"
          correction: "interaktive"
        - typo: "labelled"
          correction: "labelled"
    staticcheck:
      checks:
        - SA1032

  exclusions:
    rules:
      - linters:
          - staticcheck
        text: "QF"

formatters:
  enable:
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  modules-download-mode: readonly